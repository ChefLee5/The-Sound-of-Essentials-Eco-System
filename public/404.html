<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>The Sound of Essentials: Rhythm Quest</title>
    <script>
        // SPA redirect for GitHub Pages
        // Converts the path into a query string so index.html can handle routing
        const segment = 1; // number of path segments to keep (repo name)
        const loc = window.location;
        loc.replace(
            loc.protocol + '//' + loc.hostname + (loc.port ? ':' + loc.port : '') +
            loc.pathname.split('/').slice(0, 1 + segment).join('/') + '/?/' +
            loc.pathname.slice(1).split('/').slice(segment).join('/').replace(/&/g, '~and~') +
            (loc.search ? '&' + loc.search.slice(1).replace(/&/g, '~and~') : '') +
            loc.hash
        );
    </script>
</head>

<body>
</body>

</html>
